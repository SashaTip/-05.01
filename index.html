<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ПДД-квиз для школьников</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar" aria-label="Панель приложения">
        <div>
          <p class="eyebrow">Школьная викторина</p>
          <h1>ПДД-квиз</h1>
        </div>
        <div class="score-strip" aria-live="polite">
          <span>Лучший результат</span>
          <strong id="bestScore">0%</strong>
        </div>
      </header>

      <main class="quiz-layout">
        <aside class="control-panel" aria-label="Настройки викторины">
          <section class="panel-section">
            <h2>Класс</h2>
            <div class="segmented" role="radiogroup" aria-label="Выбор уровня">
              <button class="segment is-active" type="button" data-level="junior" aria-pressed="true">1-4</button>
              <button class="segment" type="button" data-level="middle" aria-pressed="false">5-7</button>
              <button class="segment" type="button" data-level="senior" aria-pressed="false">8-11</button>
            </div>
          </section>

          <section class="panel-section">
            <h2>Тема</h2>
            <div class="category-grid" id="categoryList" aria-label="Выбор темы"></div>
          </section>

          <section class="panel-section stats-panel">
            <div>
              <span class="metric-label">Счет</span>
              <strong id="scoreValue">0</strong>
            </div>
            <div>
              <span class="metric-label">Серия</span>
              <strong id="streakValue">0</strong>
            </div>
            <div>
              <span class="metric-label">Вопрос</span>
              <strong id="questionCounter">1/10</strong>
            </div>
          </section>

          <button class="primary-action" type="button" id="restartButton">Новый раунд</button>
        </aside>

        <section class="quiz-stage" aria-label="Вопрос викторины">
          <div class="progress-track" aria-hidden="true">
            <span id="progressFill"></span>
          </div>

          <div class="question-grid">
            <div class="scene-panel">
              <div id="scene" class="traffic-scene" aria-hidden="true"></div>
              <div class="source-line">
                <span id="categoryBadge">Пешеход</span>
                <span id="sourceText">ПДД РФ</span>
              </div>
            </div>

            <article class="question-panel">
              <p class="scenario" id="scenarioText"></p>
              <h2 id="questionText"></h2>
              <div class="answer-list" id="answerList"></div>
              <div class="feedback" id="feedback" hidden></div>
              <div class="actions-row">
                <button class="ghost-action" type="button" id="explainButton">Показать подсказку</button>
                <button class="primary-action" type="button" id="nextButton" disabled>Дальше</button>
              </div>
            </article>
          </div>
        </section>

        <section class="result-screen" id="resultScreen" hidden aria-label="Итог викторины">
          <div class="result-content">
            <p class="eyebrow">Финиш</p>
            <h2 id="resultTitle">Отличный раунд</h2>
            <p id="resultSummary"></p>
            <div class="result-metrics">
              <div>
                <span class="metric-label">Верно</span>
                <strong id="resultCorrect">0</strong>
              </div>
              <div>
                <span class="metric-label">Точность</span>
                <strong id="resultPercent">0%</strong>
              </div>
              <div>
                <span class="metric-label">Лучшая серия</span>
                <strong id="resultStreak">0</strong>
              </div>
            </div>
            <div class="review-list" id="reviewList"></div>
            <button class="primary-action" type="button" id="againButton">Пройти еще раз</button>
          </div>
        </section>
      </main>

      <footer class="footer-note">
        <span>Учебная версия для занятий и классных часов.</span>
        <a href="https://www.mos.ru/upload/content/files/72710e1bb2104dfcb41f93ac3544ab8e/1090-PPRFot23101993_Opravilahdoroj_dvij%28sizmna16072025deistvs01092025po28022029%29.pdf" target="_blank" rel="noreferrer">ПДД РФ</a>
        <a href="https://report.gibdd.ru/about/social/children-safety/" target="_blank" rel="noreferrer">Госавтоинспекция: детская безопасность</a>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
